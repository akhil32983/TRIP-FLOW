name: CD - Manual OCI Build

on:
  workflow_dispatch:
  
  push:
    branches:
      - develop

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      final-tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate dynamic tag
        id: set-tag
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${BRANCH_NAME}-${TIMESTAMP}-${SHORT_SHA}"
          echo "Generated tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update docker-compose.dev.yaml with dynamic tag
        run: |
          sed -i "s/:dev/:${{ steps.set-tag.outputs.tag }}/g" docker/docker-compose.dev.yaml

  build:
    needs: prepare
    uses: ./.github/workflows/cd-build.yaml
    with:
      tag: ${{ needs.prepare.outputs.final-tag }}
      compose_file: docker/docker-compose.dev.yaml
      services: '["backend","frontend"]'
    secrets: inherit
