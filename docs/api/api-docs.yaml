openapi: 3.1.0
info:
  title: TripFlow API
  description: "API documentation for TripFlow, the travel planning application."
  version: v1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- auth_token: []
tags:
- name: AI Generation
  description: AI generation and processing
- name: Statistics
  description: Endpoints for retrieving statistics
- name: Users Management
  description: User management and operations
- name: Health Check
  description: Endpoint for checking the health status of the application
- name: Authentication
  description: Endpoints for user authentication and authorization
- name: Itinerary Management
  description: Endpoints for managing itineraries
paths:
  /api/v1/users/{username}:
    get:
      tags:
      - Users Management
      summary: Get user by username
      description: Retrieves a user by their username.
      operationId: getUserByUsername
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: User retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
    put:
      tags:
      - Users Management
      summary: Update user by username
      description: Updates a user by their username.
      operationId: updateUser
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          description: User updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
      security:
      - auth_token: []
    delete:
      tags:
      - Users Management
      summary: Delete user by username
      description: Deletes a user by their username.
      operationId: deleteUser
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: User deleted successfully
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      security:
      - auth_token: []
  /api/v1/itineraries/{id}:
    get:
      tags:
      - Itinerary Management
      summary: Get Itinerary by ID
      description: Retrieves the details of a specific itinerary by its ID for the
        authenticated user.
      operationId: getItineraryById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Itinerary retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "404":
          description: Itinerary not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "403":
          description: Access to the itinerary is forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
      security:
      - auth_token: []
    put:
      tags:
      - Itinerary Management
      summary: Update Itinerary
      description: Updates an existing itinerary for the authenticated user.
      operationId: updateItinerary
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtendedItineraryDTO"
        required: true
      responses:
        "200":
          description: Itinerary updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "400":
          description: Invalid itinerary data provided
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "404":
          description: Itinerary not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "403":
          description: Access to the itinerary is forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
      security:
      - auth_token: []
    delete:
      tags:
      - Itinerary Management
      summary: Delete Itinerary
      description: Deletes an existing itinerary for the authenticated user.
      operationId: deleteItinerary
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Itinerary deleted successfully
        "401":
          description: Unauthorized access
        "404":
          description: Itinerary not found
        "403":
          description: Access to the itinerary is forbidden
        "500":
          description: Internal server error
      security:
      - auth_token: []
  /api/v1/users/{username}/avatar:
    get:
      tags:
      - Users Management
      summary: Get avatar for user by username
      description: Retrieves an avatar for a user by their username.
      operationId: getAvatar
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Avatar retrieved successfully
          content:
            '*/*':
              schema:
                type: string
                format: binary
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                type: string
                format: binary
      security:
      - auth_token: []
    post:
      tags:
      - Users Management
      summary: Upload avatar for user by username
      description: Uploads an avatar for a user by their username.
      operationId: uploadAvatar
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required:
              - avatar
      responses:
        "200":
          description: Avatar uploaded successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "415":
          description: Unsupported media type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicUserDTO"
      security:
      - auth_token: []
  /api/v1/itineraries:
    get:
      tags:
      - Itinerary Management
      summary: Get All Itineraries
      description: Retrieves a paginated list of itineraries for the authenticated
        user.
      operationId: getAllItineraries
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      - name: search
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Itineraries retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
      security:
      - auth_token: []
    post:
      tags:
      - Itinerary Management
      summary: Create Itinerary
      description: Creates a new itinerary for the authenticated user.
      operationId: createItinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtendedItineraryDTO"
        required: true
      responses:
        "201":
          description: Itinerary created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "400":
          description: Invalid itinerary data provided
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
      security:
      - auth_token: []
  /api/v1/itineraries/:
    get:
      tags:
      - Itinerary Management
      summary: Get All Itineraries
      description: Retrieves a paginated list of itineraries for the authenticated
        user.
      operationId: getAllItineraries_1
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      - name: search
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Itineraries retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOItineraryDTO"
      security:
      - auth_token: []
    post:
      tags:
      - Itinerary Management
      summary: Create Itinerary
      description: Creates a new itinerary for the authenticated user.
      operationId: createItinerary_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtendedItineraryDTO"
        required: true
      responses:
        "201":
          description: Itinerary created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "400":
          description: Invalid itinerary data provided
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExtendedItineraryDTO"
      security:
      - auth_token: []
  /api/v1/ai:
    post:
      tags:
      - AI Generation
      summary: Submit AI Processing Request
      description: Submits a request for AI processing based on user preferences.
      operationId: handleAIRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGenerationRequest"
        required: true
      responses:
        "200":
          description: AI request submitted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIResponse"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIResponse"
        "429":
          description: Too many requests - daily AI usage limit exceeded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIResponse"
      security:
      - auth_token: []
  /api/auth/verify:
    post:
      tags:
      - Authentication
      summary: Account Verification Endpoint
      description: Verifies a user account using the provided code.
      operationId: verify
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyAccountRequest"
        required: true
      responses:
        "200":
          description: Account verified successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Account verification failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/resend-code:
    post:
      tags:
      - Authentication
      summary: Resend Verification Code
      description: Resends the verification code to the user's email.
      operationId: resendCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendCodeRequest"
        required: true
      responses:
        "200":
          description: Verification code sent successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Failed to resend verification code
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: User Registration Endpoint
      description: Registers a new user with the provided details.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
        required: true
      responses:
        "201":
          description: User registered successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: User registration failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Token Refresh Endpoint
      description: Refreshes the authentication token using a valid refresh token.
      operationId: refresh
      parameters:
      - name: refresh_token
        in: cookie
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Token refresh failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/logout:
    post:
      tags:
      - Authentication
      summary: User Logout Endpoint
      description: Logs out the authenticated user and terminates the session.
      operationId: logout
      responses:
        "200":
          description: User logged out successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: User logout failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: User Login Endpoint
      description: Authenticates a user and initiates a session.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: User logged in successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: User login failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/users:
    get:
      tags:
      - Users Management
      summary: Get all users
      description: Retrieves a list of all users.
      operationId: getAllUsers
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      - name: search
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Users retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOPublicUserDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaginatedDTOPublicUserDTO"
  /api/v1/stats/user:
    get:
      tags:
      - Statistics
      summary: Get User Statistics
      description: Retrieves statistics related to the authenticated user.
      operationId: getUserStats
      responses:
        "200":
          description: User statistics retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserStatsDTO"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserStatsDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserStatsDTO"
      security:
      - auth_token: []
  /api/v1/ai/status:
    get:
      tags:
      - AI Generation
      summary: Get AI Status
      description: Retrieves the AI status for the authenticated user.
      operationId: getAIStatus
      responses:
        "200":
          description: AI status retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIStatus"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIStatus"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AIStatus"
      security:
      - auth_token: []
  /api/health/:
    get:
      tags:
      - Health Check
      summary: Health Check Endpoint
      description: Returns the health status of the application.
      operationId: healthCheck
      responses:
        "200":
          description: Application is healthy
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/health:
    get:
      tags:
      - Health Check
      summary: Health Check Endpoint
      description: Returns the health status of the application.
      operationId: healthCheck_1
      responses:
        "200":
          description: Application is healthy
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
components:
  schemas:
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        location:
          type: string
    PublicUserDTO:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        description:
          type: string
        location:
          type: string
        createdAt:
          type: string
          format: date-time
        role:
          type: string
          enum:
          - USER
          - ADMIN
        plan:
          type: string
          enum:
          - FREE
          - PRO
          - PREMIUM
    ActivityDTO:
      type: object
      properties:
        activity:
          type: string
        details:
          type: string
        location:
          $ref: "#/components/schemas/LocationDTO"
        time:
          type: string
        duration:
          type: string
    CoordinatesDTO:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
    ExtendedItineraryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        place:
          type: string
        people:
          type: integer
          format: int32
        budget:
          type: number
          format: double
        date:
          type: string
        tags:
          type: array
          items:
            type: string
        updatedCount:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - DRAFT
          - PLANNED
          - ONGOING
          - COMPLETED
        days:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryDayDTO"
        countDays:
          type: integer
          format: int32
        coverImage:
          $ref: "#/components/schemas/ExternalImageDTO"
    ExternalImageDTO:
      type: object
      properties:
        imageUrl:
          type: string
        altDescription:
          type: string
        authorUsername:
          type: string
    ItineraryDayDTO:
      type: object
      properties:
        day:
          type: integer
          format: int32
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ActivityDTO"
    LocationDTO:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        coordinates:
          $ref: "#/components/schemas/CoordinatesDTO"
    AIGenerationRequest:
      type: object
      properties:
        aiPrompt:
          type: string
        destination:
          type: string
        style:
          type: string
        budget:
          type: number
          format: double
        lodging:
          type: string
        duration:
          type: string
        interests:
          type: array
          items:
            type: string
    AIResponse:
      type: object
      properties:
        message:
          type: string
        aiUsage:
          $ref: "#/components/schemas/AIUsageDTO"
    AIUsageDTO:
      type: object
      properties:
        usedQuota:
          type: integer
          format: int64
        remainingQuota:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        resetDate:
          type: string
          format: date
    VerifyAccountRequest:
      type: object
      properties:
        username:
          type: string
        code:
          type: string
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: string
        user:
          $ref: "#/components/schemas/PublicUserDTO"
    ResendCodeRequest:
      type: object
      properties:
        username:
          type: string
    RegisterUserRequest:
      type: object
      properties:
        email:
          type: string
        username:
          type: string
        password:
          type: string
        confirmPassword:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PaginatedDTOPublicUserDTO:
      type: object
      properties:
        page:
          type: array
          items:
            $ref: "#/components/schemas/PublicUserDTO"
        currentPage:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        totalItems:
          type: integer
          format: int64
        itemsPerPage:
          type: integer
          format: int64
        isLastPage:
          type: boolean
    StatDTO:
      type: object
      properties:
        key:
          type: string
        value:
          type: integer
          format: int64
    UserStatsDTO:
      type: object
      properties:
        stats:
          type: array
          items:
            $ref: "#/components/schemas/StatDTO"
    ItineraryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        place:
          type: string
        people:
          type: integer
          format: int32
        budget:
          type: number
          format: double
        date:
          type: string
        countDays:
          type: integer
          format: int32
        tags:
          type: array
          items:
            type: string
        updatedCount:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - DRAFT
          - PLANNED
          - ONGOING
          - COMPLETED
        coverImage:
          $ref: "#/components/schemas/ExternalImageDTO"
    PaginatedDTOItineraryDTO:
      type: object
      properties:
        page:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryDTO"
        currentPage:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        totalItems:
          type: integer
          format: int64
        itemsPerPage:
          type: integer
          format: int64
        isLastPage:
          type: boolean
    AIStatus:
      type: object
      properties:
        isProcessing:
          type: boolean
