server.port=8081
spring.application.name=tripflow-ai-service

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/tripflow_ai_db}
spring.datasource.username=${POSTGRES_USER:tripflow_user}
spring.datasource.password=${POSTGRES_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:create-drop}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Logging configuration
logging.level.root=INFO
logging.level.com.tripflow=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# AI Configuration
ai.api.key=${AI_API_KEY}
ai.api.url=${AI_API_URL:https://openrouter.ai/api/v1}
ai.api.model=${AI_API_MODEL:openai/gpt-oss-20b:free}

# JWT Configuration
jwt.secret=${JWT_SECRET}