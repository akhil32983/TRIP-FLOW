server.port=8080
spring.application.name=tripflow-api-service

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/tripflow_db}
spring.datasource.username=${POSTGRES_USER:tripflow_user}
spring.datasource.password=${POSTGRES_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Logging configuration
logging.level.root=INFO
logging.level.com.tripflow=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Admin User Configuration
admin.email=${ADMIN_EMAIL}
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Unsplash API Configuration
unsplash.api.key=${UNSPLASH_API_KEY}