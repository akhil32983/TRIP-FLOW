server.port=8082
spring.application.name=tripflow-notification-service

# Server Performance & Encoding
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# JSON Date Format
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=jdbc:h2:file:./data/notification-service-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=tripflow
spring.datasource.password=tripflow
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Logging configuration
logging.level.root=INFO
logging.level.com.tripflow=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.messaging=WARN

jwt.secret=${JWT_SECRET}

# Mailing Config
email.sender=${EMAIL_SENDER}
email.brevo.apiKey=${EMAIL_BREVO_API_KEY}