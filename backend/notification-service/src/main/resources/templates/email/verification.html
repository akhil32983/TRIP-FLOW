<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Cuenta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            color: #666666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .code {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }
        .footer {
            font-size: 12px;
            color: #999999;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verificación de Cuenta</h1>
        <p>Gracias por registrarte en TripFlow. Para completar tu registro, por favor utiliza el siguiente código de verificación:</p>
        <div class="code">{{code}}</div>
        <p>Este código expirará en 15 minutos.</p>
        <div class="footer">
            &copy; 2025 TripFlow. Todos los derechos reservados.
        </div>
    </div>
</body>
</html>
