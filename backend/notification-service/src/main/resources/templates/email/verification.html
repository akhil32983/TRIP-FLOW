<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        /* Reset styles for email clients */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #101922;
            margin: 0;
            padding: 0;
            width: 100% !important;
            height: 100% !important;
            color: #FFFFFF;
            padding-inline: 12px;
        }

        .code {
            font-size: 48px;
            font-weight: 700;
            color: #33a7d8;
            letter-spacing: 8px;
            margin: 32px 0;
            display: block;
        }
        
        /* Mobile responsive */
        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            .code {
                font-size: 32px !important;
                letter-spacing: 4px !important;
            }
        }
    </style>
</head>
<body width="100%" style="margin: 0; padding: 0 !important; mso-line-height-rule: exactly; background-color: #101922;">
    <center style="width: 100%; background-color: #101922;">
        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #101922;">
            <tr>
                <td align="center" style="padding: 40px 0;">
                    <!-- Container -->
                    <table class="email-container" role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%; text-align: center;">
                        
                        <!-- Logo -->
                        <tr>
                            <td align="center" style="padding-bottom: 30px;">
                                <div style="color: #33a7d8; font-weight: 700; font-size: 42px; font-family: 'Inter', sans-serif;">TripFlow</div>
                            </td>
                        </tr>

                        <!-- Title -->
                        <tr>
                            <td align="center" style="padding-bottom: 24px;">
                                <h1 style="margin: 0; color: #FFFFFF; font-size: 24px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; font-family: 'Inter', sans-serif;">Account Verification</h1>
                            </td>
                        </tr>

                        <!-- Message -->
                        <tr>
                            <td align="center" style="padding-bottom: 32px;">
                                <p style="margin: 0; color: #F8FAFC; font-size: 16px; line-height: 1.6; max-width: 464px; font-family: 'Inter', sans-serif;">
                                    Thank you for signing up for TripFlow. To complete your registration, please use the verification code below:
                                </p>
                            </td>
                        </tr>

                        <!-- Code -->
                        <tr>
                            <td align="center" style="padding-bottom: 32px;">
                                <div class="code" style="font-family: 'Inter', sans-serif; font-size: 48px; font-weight: 700; color: #33a7d8; letter-spacing: 8px;">{{code}}</div>
                            </td>
                        </tr>

                        <!-- Expiration -->
                        <tr>
                            <td align="center" style="padding-bottom: 48px;">
                                <p style="margin: 0; font-size: 14px; color: #94A3B8; font-family: 'Inter', sans-serif;">
                                    This code will expire in <strong style="color: #33a7d8;">15 minutes</strong>.
                                </p>
                            </td>
                        </tr>

                        <!-- Divider -->
                        <tr>
                            <td align="center">
                                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                    <tr>
                                        <td style="border-top: 1px solid #273240;"></td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td align="center" style="padding-top: 24px;">
                                <p style="margin: 0; font-size: 12px; color: #94A3B8; font-family: 'Inter', sans-serif;">
                                    &copy; 2025 TripFlow. All rights reserved.
                                </p>
                            </td>
                        </tr>

                    </table>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
